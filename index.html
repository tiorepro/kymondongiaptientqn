<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Kỳ Môn Độn Giáp – Pro Engine - TIEN.TQN</title>
  <style>
    :root {
      --bg: #f3f4f6; --paper: #ffffff; --surface: #f8fafc; --border: #e5e7eb;
      --line: #f3f4f6; --text-main: #1f2937; --text-muted: #6b7280;
      --accent: #8b1818; --accent-hover: #7f1d1d; --good: #0f766e; --bad: #b42318;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      --radius-lg: 16px; --radius-md: 10px; --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text-main);
      font-family: "Times New Roman", "Georgia", serif;
      font-size: 14.5px; font-weight: 400; -webkit-font-smoothing: antialiased; padding: 12px 6px;
    }
    .page {
      width: 100%; max-width: 1050px; margin: 0 auto 20px auto;
      background: var(--paper); border-radius: var(--radius-lg);
      border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
    }
    .page-header { padding: 18px 20px; background: #fff; border-bottom: 1px solid var(--border); }
    .page-header .title { font-size: 20px; font-weight: bold; color: var(--accent); letter-spacing: 0.2px; }
    .page-header .sub { font-size: 13.5px; color: var(--text-muted); margin-top: 6px; }
    .page-body { padding: 14px; }

    .toolbar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
    .input-group {
      display: flex; align-items: center; background: #fff;
      border: 1px solid var(--border); border-radius: var(--radius-md); padding: 6px 12px; flex: 1;
    }
    .input-group label { font-size: 14px; color: var(--text-muted); margin-right: 12px; white-space: nowrap; font-family: sans-serif; }
    input[type="datetime-local"], select.opts {
      flex: 1; height: 34px; border: none; background: transparent;
      font-family: sans-serif; font-size: 15px; color: var(--text-main); outline: none;
    }
    select.opts { text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }

    .btn-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .btn {
      flex: 1; height: 46px; border-radius: var(--radius-md); background: var(--accent); color: #fff;
      font-size: 14px; border: none; cursor: pointer; transition: all 0.2s; font-family: sans-serif; font-weight: 500;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn.secondary { background: #fff; color: var(--text-main); border: 1px solid var(--border); }
    .btn.secondary:hover { background: var(--surface); }

    .settings-group { display: flex; flex-direction: column; justify-content: center; gap: 10px; margin-bottom: 16px; }
    .settings-group .input-group { width: 100%; }

    .info {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 20px; overflow: hidden;
    }
    .kv { background: #fff; padding: 12px 14px; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
    .k { font-size: 13px; color: var(--text-muted); }
    .v { font-size: 15px; color: var(--text-main); line-height: 1.5; word-break: break-word; }

    .boards { display: grid; grid-template-columns: 1fr; gap: 16px; width: 100%; }
    .board { background: #fff; border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; height: 100%; }
    .board-head { background: var(--surface); padding: 10px 0; text-align: center; border-bottom: 1px solid var(--border); }
    .board-head h2 { font-size: 15px; font-weight: bold; color: var(--accent); margin: 0; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--line); gap: 1px; flex: 1; width: 100%; }
    .cell { background: #fff; display: flex; flex-direction: column; min-height: 85px; }
    .cell.dim { opacity: 0.35; }
    .cell-shell { padding: 6px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 4px; }
    .cell-topline { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .meta-chip { font-size: 11px; color: #854d0e; font-family: sans-serif; }
    .pos { font-size: 11.5px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; font-family: sans-serif; }
    .qm-main { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; text-align: center; align-items: center; }
    .qm-value, .qm-gate, .stem-line, .pat { font-size: 14px; color: var(--text-main); white-space: normal; word-break: break-word; line-height: 1.4; }
    .qm-gate { text-align: center; color: var(--accent); font-weight: bold; margin: 4px 0; }
    .qm-stems { display: flex; flex-direction: column; gap: 2px; }
    .pat-wrap { display: flex; flex-direction: column; gap: 4px; }
    .pat.good { color: var(--good); }
    .pat.bad { color: var(--bad); }
    .empty { font-size: 13px; color: var(--text-muted); text-align: center; margin: auto; }

    footer { text-align: center; font-size: 12px; color: var(--text-muted); padding: 20px 0 10px 0; font-family: sans-serif; }

    .page-2-header { text-align: center; padding: 20px 0 16px 0; border-bottom: 1px dashed var(--border); margin-bottom: 16px; }
    .page-2-header h2 { font-size: 18px; font-weight: bold; color: var(--accent); margin: 0; }
    .topic-layout { display: grid; grid-template-columns: 1fr; gap: 16px; padding: 0 14px 16px 14px; }
    .topic-panel, .result-panel { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow); }
    .topic-panel-head, .result-panel-head, .note-head { background: var(--surface); padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .topic-panel-head label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 8px; font-family: sans-serif; }
    select#topicSelect { width: 100%; height: 38px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-family: sans-serif; font-size: 14.5px; outline: none; background: #fff; padding: 0 10px; }
    .topic-guide-box, .result-body { padding: 14px; font-size: 15px; line-height: 1.6; color: var(--text-main); min-height: 250px; }
    .result-panel-head { display: flex; justify-content: space-between; align-items: center; }
    .result-panel-head span { font-weight: bold; color: var(--accent); font-size: 15px; font-family: sans-serif; }
    .btn-small { height: 28px; padding: 0 12px; font-size: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: #fff; color: var(--text-main); cursor: pointer; font-family: sans-serif; }
    .btn-small:hover { background: var(--surface); }
    .note-panel { border-top: 1px solid var(--border); background: #fdfdfc; }
    .note-head { background: #fefce8; border-bottom: 1px solid #fef08a; display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; }
    .note-head span { font-size: 13px; color: #92400e; font-family: sans-serif; }
    textarea#analysisNote { width: 100%; border: none; background: transparent; padding: 14px; font-family: inherit; font-size: 14.5px; color: var(--text-main); outline: none; min-height: 100px; resize: vertical; line-height: 1.6; }

    @media (min-width: 560px) {
      .toolbar { flex-direction: row; align-items: stretch; }
      .btn-group { flex: 0 0 200px; margin-bottom: 0; }
      .boards { grid-template-columns: 1fr 1fr; gap: 12px; }
      .qm-value, .qm-gate, .stem-line, .pat { font-size: 13.5px; }
      .topic-layout { grid-template-columns: 240px 1fr; gap: 12px; }
      .settings-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .settings-group .input-group { padding: 5px 8px; }
      .settings-group .input-group label { font-size: 12px; margin-right: 6px; }
      select.opts { font-size: 13px; }
    }
    @media (min-width: 900px) {
      .settings-group { grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .settings-group .input-group { padding: 6px 12px; }
      .settings-group .input-group label { font-size: 14px; margin-right: 12px; }
      select.opts { font-size: 14.5px; }
    }
    @media (min-width: 768px) {
      .toolbar { gap: 16px; }
      .btn-group { flex: 0 0 240px; }
      .boards { gap: 20px; }
      .qm-value, .qm-gate, .stem-line, .pat { font-size: 14.5px; }
      .topic-layout { grid-template-columns: 320px 1fr; gap: 20px; }
      .info { grid-template-columns: repeat(5, 1fr); }
      .kv { padding: 10px 8px; }
      .v { font-size: 14px; }
    }

    /* ===== BADGE STATUS ===== */
    .badge-row {
      display: flex; flex-wrap: wrap; gap: 3px;
      margin-top: 4px; padding-top: 3px;
      border-top: 1px dashed rgba(0,0,0,0.08);
    }
    .badge {
      display: inline-block; font-size: 10px; line-height: 1;
      padding: 2px 5px; border-radius: 3px; font-family: sans-serif;
      font-weight: 600; white-space: nowrap;
    }
    .badge-void  { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }
    .badge-horse { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge-mo    { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .badge-quy   { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .badge-tt    { background: #fdf4ff; color: #7e22ce; border: 1px solid #e9d5ff; }
    .badge-tp    { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
    .badge-vuong { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .badge-suy   { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
    /* ======================== */

  </style>
</head>
<body>

<div class="page page-1">
  <div class="page-header">
    <div class="title">Kỳ Môn Độn Giáp – TIEN.TQN</div>
    <div class="sub">Tích Hợp Đa Hệ: Hà Đồ và Lạc Thư</div>
  </div>
  <div class="page-body">

    <div class="toolbar">
      <div class="input-group">
        <label>Ngày giờ</label>
        <input id="dt" type="datetime-local" />
      </div>
      <div class="btn-group">
        <button class="btn" id="btnCalc">Lập bàn</button>
        <button class="btn secondary" id="btnNow">Bây giờ</button>
      </div>
    </div>

    <div class="settings-group">
      <div class="input-group">
        <label>Hệ Thống</label>
        <select id="optHeThong" class="opts">
          <option value="hado">Hà Đồ Cửu Cung</option>
          <option value="lacthu">Lạc Thư Cửu Cung</option>
        </select>
      </div>
      <div class="input-group">
        <label>Cách An</label>
        <select id="optDiCung" class="opts">
          <option value="chuyen">Chuyển Bàn</option>
          <option value="phi">Phi Toàn Bàn</option>
        </select>
      </div>
      <div class="input-group">
        <label>Định Cục</label>
        <select id="optAnCuc" class="opts">
          <option value="trietbo">Triết Bổ Pháp</option>
          <option value="phudau" selected>Trí Nhuận Pháp</option>
        </select>
      </div>
      <div class="input-group">
        <label>Ký Khôn</label>
        <select id="optKyCung" class="opts">
          <option value="khon">Âm Dương Khôn</option>
          <option value="can_khon">Dương Cấn - Âm Khôn</option>
        </select>
      </div>
    </div>

    <div class="info" id="info"></div>

    <div class="boards">
      <div class="board">
        <div class="board-head"><h2>Bảng Kỳ Môn</h2></div>
        <div class="grid" id="gridQimen"></div>
      </div>
      <div class="board">
        <div class="board-head"><h2>Bảng Cách Cục</h2></div>
        <div class="grid" id="gridPatterns"></div>
      </div>
    </div>
    <footer>Kỳ Môn Độn Giáp by TIEN.TQN</footer>
  </div>
</div>

<div class="page page-2">
  <div class="page-2-header"><h2>Bảng Luận Quẻ Theo Chủ Đề</h2></div>
  <div class="topic-layout">
    <div class="topic-panel">
      <div class="topic-panel-head">
        <label>Chọn chủ đề xem quẻ</label>
        <select id="topicSelect">
          <option value="">-- Chọn chủ đề --</option>
          <option value="1">1. Cơ thể</option>
          <option value="2">2. Nghề nghiệp</option>
          <option value="3">3. Thăng chức</option>
          <option value="4">4. Tìm người dẫn đường</option>
          <option value="5">5. Chuyển việc</option>
          <option value="6">6. Xin việc</option>
          <option value="7">7. Mua hàng</option>
          <option value="8">8. Bán hàng</option>
          <option value="9">9. Mở kinh doanh</option>
          <option value="10">10. Hợp tác</option>
          <option value="11">11. Mua bán BĐS</option>
          <option value="12">12. Đi vay / cho vay</option>
          <option value="13">13. Đòi nợ</option>
          <option value="14">14. Thi đấu</option>
          <option value="15">15. Thi cử</option>
          <option value="16">16. Chỗ đỗ xe</option>
          <option value="17">17. Du lịch</option>
          <option value="18">18. Hôn nhân</option>
          <option value="19">19. Sinh nở (giới tính)</option>
          <option value="20">20. Sinh nở</option>
          <option value="21">21. Sức khỏe</option>
          <option value="22">22. Kiện tụng</option>
          <option value="23">23. Tố tụng hình sự</option>
          <option value="24">24. Đi lạc</option>
          <option value="25">25. Mất đồ</option>
          <option value="26">26. Thời tiết</option>
        </select>
      </div>
      <div id="topicGuide" class="topic-guide-box">
        <div style="color:var(--text-muted);text-align:center;padding:40px 0;font-family:sans-serif;">Vui lòng chọn chủ đề để xem hướng dẫn</div>
      </div>
    </div>
    <div class="result-panel">
      <div class="result-panel-head">
        <span>Luận Quẻ</span>
        <button id="btnReAnalyze" class="btn-small">Luận lại</button>
      </div>
      <div id="analysisResult" class="result-body">
        <div style="color:var(--text-muted);text-align:center;padding:40px 0;font-family:sans-serif;">Chọn chủ đề để luận quẻ</div>
      </div>
      <div class="note-panel">
        <div class="note-head">
          <span>Ghi chú & luận giải từ Khầy Dương Minh</span>
          <button id="btnClearNote" class="btn-small">Xóa</button>
        </div>
        <textarea id="analysisNote" placeholder="Thêm nhận xét, diễn giải riêng..."></textarea>
      </div>
    </div>
  </div>
</div>

<script src="events.js"></script>
<script src="3meta.js"></script>
<script src="KyMonCachCuc.js"></script>
<script src="KyMonEngine.js"></script>
<script src="fixGanZhi.js"></script>
<script src="logicluanque.js"></script>
<script src="main.js"></script>

</body>
</html>
